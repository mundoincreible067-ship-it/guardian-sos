name: guardian_sos
description: "Guardian SOS - Aplicación profesional de emergencias personales"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

# NOTA: este pubspec.yaml se dejó deliberadamente MÍNIMO — solo con los
# paquetes que el código en lib/ usa de verdad hoy — para lograr una
# primera compilación limpia. La lista de paquetes para las funciones
# pendientes (cámara, grabación, mapa, notificaciones, voz, QR, etc.)
# está documentada en el README bajo "Pendiente para la siguiente
# iteración". Cada uno se agrega y se prueba de uno en uno cuando
# construyamos esa función, para detectar de inmediato si alguno rompe
# la compilación (varios paquetes nativos de Android aún no son
# compatibles con Android Gradle Plugin 9, lanzado recientemente).
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Ubicación
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Permisos
  permission_handler: ^11.3.1

  # Comunicaciones (compositores, no envío silencioso — ver README)
  url_launcher: ^6.3.0
  telephony: ^0.2.0

  # Almacenamiento local
  shared_preferences: ^2.2.3

  # Batería
  battery_plus: ^6.0.1

  # Utilidades
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
